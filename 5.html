<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Table Example</title>
</head>
<body>
    <h2>Student Table Example</h2>

    <table border="1">
        <!-- Header Row -->
        <tr>
            <th rowspan="2">Student ID</th>
            <th rowspan="2">Name</th>
            <th colspan="2">Marks</th>
        </tr>

        <tr>
            <th>Maths</th>
            <th>Science</th>
        </tr>

        <!-- Row 1 -->
        <tr>
            <td>102</td>
            <td>Somu</td>
            <td>10</td>
            <td>19</td>
        </tr>

        <!-- Row 2 -->
        <tr>
            <td>103</td>
            <td>Das</td>
            <td>15</td>
            <td>18</td>
        </tr>

        <!-- Row 3 -->
        <tr>
            <td>104</td>
            <td>Pritam</td>
            <td>20</td>
            <td>17</td>
        </tr>

        <!-- Row 4 -->
        <tr>
            <td>105</td>
            <td>Rishav</td>
            <td>85</td>
            <td>96</td>
        </tr>
    </table>
</body>
</html>
